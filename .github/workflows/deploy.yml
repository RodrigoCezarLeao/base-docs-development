# Reusable deploy pipeline: build backend image → push to GHCR, build frontend,
# then ship to the VPS over Tailscale (the VPS never compiles).
#
# Called by deploy-dev.yml and deploy-prod.yml. To deploy more than one project,
# call this workflow once per project (see the callers).

name: deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment to deploy to (dev | production)"
        required: true
        type: string
      project:
        description: "Project slug — image name and /var/www/<project>"
        required: true
        type: string
      api_path:
        description: "Path to the API project (docker build context)"
        required: true
        type: string
      web_path:
        description: "Path to the frontend project"
        required: true
        type: string
      api_base_url:
        description: "VITE_API_URL baked into the frontend build for this environment"
        required: true
        type: string

jobs:
  # ── Backend: build and push the image to GHCR ──────────────────────────────────
  build-backend:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image ref
        id: meta
        run: echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/${{ inputs.project }}-api" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: build
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.api_path }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:${{ inputs.environment }}
          build-args: |
            APP_COMMIT=${{ github.sha }}
            APP_BUILD_TIME=${{ steps.build.outputs.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend: build static assets (VITE_API_URL is inlined per environment) ────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build metadata
        id: build
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ inputs.web_path }}/pnpm-lock.yaml
      - name: Install & build
        working-directory: ${{ inputs.web_path }}
        env:
          VITE_API_URL: ${{ inputs.api_base_url }}
          VITE_APP_COMMIT: ${{ github.sha }}
          VITE_APP_BUILD_TIME: ${{ steps.build.outputs.time }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ inputs.environment }}
          path: ${{ inputs.web_path }}/dist

  # ── Deploy: ship to the VPS over Tailscale ─────────────────────────────────────
  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # gates prod behind required reviewers
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-${{ inputs.environment }}
          path: dist

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config

      - name: Sync frontend build
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" \
            dist/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/${{ inputs.project }}/"

      - name: Restart backend on the VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "GHCR_USER='${{ github.actor }}' GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' \
             bash /opt/apps/${{ inputs.project }}/deploy-remote.sh '${{ github.sha }}'"
