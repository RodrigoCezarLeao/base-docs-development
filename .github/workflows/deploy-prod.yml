# Auto-deploy to PROD on every merge into master.
# master is a protected branch — code only lands here via PR.
#
# This is a TEMPLATE. It stays inert until the repository variable ENABLE_DEPLOY
# is set to "true" (Settings → Secrets and variables → Actions → Variables). The
# base repo leaves it unset, so the deploy jobs are skipped here; a project repo
# created from this base sets it to activate deployment.
#
# The 'production' GitHub Environment should require manual approval (Settings →
# Environments → production → Required reviewers), so prod deploys wait for a click.

name: Deploy PROD

on:
  push:
    branches: [master]

jobs:
  temperature:
    if: vars.ENABLE_DEPLOY == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      project: temperature
      api_path: projects/temperature-api
      web_path: projects/temperature-web
      api_base_url: https://example.com
    secrets: inherit

