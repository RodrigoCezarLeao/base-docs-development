name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: temperature-web ──────────────────────────────────────────────
  test-temperature-web:
    name: "Frontend / temperature-web"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/temperature-web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: projects/temperature-web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test:run

  # ── Frontend: docmap-web ───────────────────────────────────────────────────
  test-docmap-web:
    name: "Frontend / docmap-web"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/docmap-web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: projects/docmap-web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test:run

  # ── Backend: temperature-api ───────────────────────────────────────────────
  test-temperature-api:
    name: "Backend / temperature-api"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore projects/temperature-api/TemperatureApi.sln

      - name: Build
        run: dotnet build projects/temperature-api/TemperatureApi.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test projects/temperature-api/TemperatureApi.sln --no-build --configuration Release --verbosity normal

  # ── Backend: docmap-api ────────────────────────────────────────────────────
  test-docmap-api:
    name: "Backend / docmap-api"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore projects/docmap-api/DocMap.sln

      - name: Build
        run: dotnet build projects/docmap-api/DocMap.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test projects/docmap-api/DocMap.sln --no-build --configuration Release --verbosity normal
